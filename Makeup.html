    <script>
        const images = document.querySelectorAll('.img-grid img');
        const featured = document.getElementById('featured');
        const featuredImg = document.getElementById('featured-img');
        const closeBtn = document.getElementById('closeFeatured');
        const grids = document.querySelectorAll('.img-grid');

        function resetView() {
            featured.classList.remove('active');
            grids.forEach(grid => grid.classList.remove('dimmed'));
            featuredImg.src = "";
        }

        images.forEach(img => {
            img.addEventListener('click', () => {
            featuredImg.src = img.src;
            featured.classList.add('active');
            grids.forEach(grid => grid.classList.add('dimmed'));
            featured.scrollIntoView({ behavior: "smooth", block: "center" });
            });
        });

        closeBtn.addEventListener('click', resetView);
    </script>
